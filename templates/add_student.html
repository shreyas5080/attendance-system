<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='sidebar.css') }}">

    <title>Add Student</title>
</head>

<body>

    <div class="d-flex">


        <div class="bg-dark text-white p-3 vh-100" style="width: 220px;">
            <h4 class="text-center">Lecturer</h4>
            <hr>

            <a href="{{ url_for('lecturer_dashboard') }}" class="d-block text-white mb-2">Dashboard</a>
            <a href="{{ url_for('add_student') }}" class="d-block text-white mb-2 fw-bold">Students</a>
            <a href="{{ url_for('attendance') }}" class="d-block text-white mb-2">Attendance</a>
            <a href="{{ url_for('report') }}" class="d-block text-white mb-2">Report</a>
            <a href="{{ url_for('logout') }}" class="d-block text-danger mt-3">Logout</a>
        </div>

        <div class="flex-grow-1 p-5">

            <h2 class="mb-4">Add New Student</h2>

            <!-- Success Alert -->
            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}

            {% if generated_user %}
            <div class="alert alert-success">
                <strong>Student Created!</strong><br>
                Username: {{ generated_user }} <br>
                Password: {{ generated_password }}
            </div>
            {% endif %}

            <!-- 📋 Form -->
            <div class="card p-4 shadow-sm" style="max-width: 500px;">
                <form method="POST" action="{{ url_for('add_student') }}">

                    <div class="mb-3">
                        <label class="form-label">Student Name</label>
                        <input type="text" name="student_name" class="form-control" placeholder="Enter full name"
                            required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Add Student
                    </button>
                </form>
            </div>

        </div>

    </div>

</body>

</html>
