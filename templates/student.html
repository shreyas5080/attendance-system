<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Student page</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, cyan, blue);
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #111;
            position: fixed;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: cyan;
            color: black;
        }

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .btn-aura {
            text-align: center;
            font-size: 18;
            padding: 10px;
            color: white;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h4 class="btn-aura">Student</h4>
        <hr>
        <a href="{{ url_for('student_dashboard') }}">Dashboard</a>
        <a href="{{ url_for('logout') }}" class="text-danger">Logout</a>
    </div>
    <div class="main">
        <h2>welcome to students dashboard</h2>
        <p>Hello {{user}}</p>
        <p class="alert alert-info mt-3 text-center" id="clock"></p>
        <div class="card bg-dark text-white p-4 mt-4">
            <h4>Recent Activity (Last 5 Days)</h4>
            <ul class="list-group list-group-flush">
                {% for record in stats %}
                <li class="list-group-item bg-transparent text-white d-flex justify-content-between align-items-center">
                    {{ record.date }}
                    {% if record.status == 1 %}
                    <span class="badge bg-success">Present</span>
                    {% else %}
                    <span class="badge bg-danger">Absent</span>
                    {% endif %}
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
    <script>
        function updateClock() {
            const now = new Date();

            // Time
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            // Format (00:00:00)
            hours = String(hours).padStart(2, '0');
            minutes = String(minutes).padStart(2, '0');
            seconds = String(seconds).padStart(2, '0');

            // Date
            let day = String(now.getDate()).padStart(2, '0');
            let month = String(now.getMonth() + 1).padStart(2, '0');
            let year = now.getFullYear();

            let fullDateTime = `${day}/${month}/${year}  ${hours}:${minutes}:${seconds}`;

            document.getElementById("clock").innerText = fullDateTime;
        }

        // Run every second
        setInterval(updateClock, 1000);

        // Run immediately
        updateClock();
    </script>

</body>

</html>
