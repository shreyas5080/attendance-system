<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #101418;
            color: #f4f7fb;
            padding: 24px;
        }

        .panel {
            max-width: 520px;
            background: #171d23;
            border: 1px solid #2c3742;
            border-radius: 8px;
            padding: 24px;
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
        }

        p {
            color: #9aa8b5;
            line-height: 1.5;
        }

        a {
            display: inline-block;
            margin-top: 12px;
            color: #101418;
            background: #16c7b7;
            border-radius: 8px;
            padding: 10px 12px;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <section class="panel">
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        <a href="{{ url_for('home_page') }}">Go Home</a>
    </section>
</body>

</html>
